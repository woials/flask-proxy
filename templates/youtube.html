<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlaskиЈҪYoutube Player</title>
    <link rel="stylesheet" href="{{url_for('static',filename='css/style.css')}}">
</head>

<body>
    <section class="container">
        <div class="search-bar">
            <input id="searchBox" type="text" placeholder="жӨңзҙў" onkeypress="if(event.key==='Enter') search()">
            <button onclick="search()">жӨңзҙў</button>
        </div>
        <h3>з”»иіӘиЁӯе®ҡ</h3>
        <select id="qualitySelect">
            <option value="144">144p</option>
            <option value="240">240p</option>
            <option value="360">360p</option>
            <option value="480">480p</option>
            <option value="720">720p</option>
            <option value="1080">1080p</option>
        </select>
        <div class="main-content">

            <div class="video-player hidden" id="playerSection">
                <video id="videoPlayer" controls></video>
                <div class="video-info">
                    <h2 id="videoTitle"></h2>
                    <small id="videoUploader"></small>
                    <p id="videoDescription"></p>

                </div>
            </div>
            <div class="sidebar">
                <h3 id="slidebarTitle">жӨңзҙўзөҗжһң</h3>
                <div class="results" id="results"></div>
            </div>
        </div>
    </section>

    <script src="{{url_for('static',filename='js/script.js')}}"></script>
</body>

</html>
