<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask獒폶outube Player</title>
    <link rel="stylesheet" href="{{url_for('static',filename='css/style.css')}}">
</head>

<body>
<section class="container">
    <div class="search-bar">
        <input id="searchBox" type="text" placeholder="濾쒐뇨" onkeypress="if(event.key==='Enter') search()">
        <button onclick="search()">濾쒐뇨</button>
    </div>

    <div class="main-content">
        <div class="video-player hidden" id="playerSection">
            <video id="videoPlayer" controls></video>
            <div class="video-info">
                <h2 id="videoTitle"></h2>
                <small id="videoUploader"></small>
                <p id="videoDescription"></p>
            </div>
        </div>
        <div class="sidebar">
            <h3 id="slidebarTitle">濾쒐뇨永먩옖</h3>
            <div class="results" id="results"></div>
        </div>
    </div>
</section>

<script src="{{url_for('static',filename='js/script.js')}}"></script>
</body>

</html>
